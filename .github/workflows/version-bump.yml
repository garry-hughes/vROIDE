name: Version Bump

on:
  workflow_dispatch:
    inputs:
      bump_type:
        description: 'Version bump type'
        required: true
        default: 'patch'
        type: choice
        options:
          - patch
          - minor
          - major

jobs:
  bump-version:
    name: Bump ${{ inputs.bump_type }} version
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Bump version in manifest
        id: bump
        shell: pwsh
        run: |
          $content = Get-Content ./src/vroide.psd1 -Raw
          $manifest = Import-PowerShellDataFile -Path ./src/vroide.psd1
          $current = [Version]$manifest.ModuleVersion
          $new = switch ('${{ inputs.bump_type }}') {
            'major' { "$($current.Major + 1).0.0" }
            'minor' { "$($current.Major).$($current.Minor + 1).0" }
            'patch' { "$($current.Major).$($current.Minor).$($current.Build + 1)" }
          }
          $updated = $content -replace "ModuleVersion\s*=\s*'[^']+'", "ModuleVersion = '$new'"
          [System.IO.File]::WriteAllText('./src/vroide.psd1', $updated, [System.Text.UTF8Encoding]::new($false))
          "new_version=$new" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          Write-Host "Bumped from $current to $new"

      - name: Commit and tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/vroide.psd1
          git commit -m "chore: bump version to v${{ steps.bump.outputs.new_version }}"
          git tag -a "v${{ steps.bump.outputs.new_version }}" -m "Release v${{ steps.bump.outputs.new_version }}"
          git push origin HEAD:${{ github.event.repository.default_branch }} --follow-tags
